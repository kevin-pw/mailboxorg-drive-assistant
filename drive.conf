# mailbox.org Drive — Default Configuration
# No secrets should be stored in this file.
# Values here serve as defaults; the setup script prompts for confirmation.

# WebDAV URL for mailbox.org Drive
WEBDAV_URL="https://dav.mailbox.org/servlet/webdav.infostore/Userstore"

# Mount point for the WebDAV drive (online)
MOUNT_POINT="/media/mailboxorg_drive_remote"

# Local directory for synchronized files (your working directory)
LOCAL_DIR="${HOME}/mailboxorg_drive_local"

# FreeFileSync version to download
FREEFILESYNC_VERSION="14.9"

# FreeFileSync installation directory
FREEFILESYNC_INSTALL_DIR="${HOME}/programs/FreeFileSync"

# RealTimeSync: seconds to wait after detecting a change before syncing
FREEFILESYNC_DELAY_SECONDS="1"